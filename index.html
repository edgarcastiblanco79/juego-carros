<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego PRO Carros</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }

canvas { display:block; margin:auto; background:#222; }

/* UI */
.controls {
    position: fixed;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: space-around;
}

button {
    font-size: 20px;
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: #00c3ff;
    color: white;
}

/* menú */
.menu {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    background:black;
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}
</style>
</head>
<body>

<div id="menu" class="menu">
    <h1>🚗 Juego de Carros PRO</h1>
    <button onclick="startGame()">▶️ Iniciar</button>
</div>

<canvas id="gameCanvas"></canvas>

<div class="controls">
    <button id="leftBtn">⬅️</button>
    <button id="rightBtn">➡️</button>
    <button id="turboBtn">🚀</button>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// 🎮 estado
let playing = false;
let gameOver = false;

// 🚗 jugador
let player = {
    x: canvas.width/2 - 20,
    y: canvas.height - 120,
    width: 40,
    height: 80,
    speed: 6,
    lives: 3
};

let enemies = [];
let score = 0;
let move = 0;
let turbo = false;
let roadOffset = 0;

// 🔊 sonidos
const engine = new Audio("https://www.soundjay.com/transportation/car-engine-1.mp3");
engine.loop = true;

const crash = new Audio("https://www.soundjay.com/transportation/car-crash-1.mp3");

// 🎬 iniciar
function startGame(){
    document.getElementById("menu").style.display="none";
    playing = true;
}

// 📱 botones
const leftBtn = document.getElementById("leftBtn");
const rightBtn = document.getElementById("rightBtn");
const turboBtn = document.getElementById("turboBtn");

leftBtn.addEventListener("touchstart", ()=> move=-1);
leftBtn.addEventListener("touchend", ()=> move=0);

rightBtn.addEventListener("touchstart", ()=> move=1);
rightBtn.addEventListener("touchend", ()=> move=0);

turboBtn.addEventListener("touchstart", ()=> turbo=true);
turboBtn.addEventListener("touchend", ()=> turbo=false);

// 💻 teclado
document.addEventListener("keydown", e=>{
    if(e.key==="ArrowLeft") move=-1;
    if(e.key==="ArrowRight") move=1;
    if(e.key==="Shift") turbo=true;
});
document.addEventListener("keyup", e=>{
    if(e.key==="ArrowLeft" || e.key==="ArrowRight") move=0;
    if(e.key==="Shift") turbo=false;
});

// enemigos
function spawnEnemy(){
    enemies.push({
        x: Math.random()*(canvas.width-40),
        y:-100,
        speed: 5 + Math.random()*3
    });
}

// carretera
function drawRoad(){
    ctx.fillStyle="#333";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.strokeStyle="white";
    ctx.setLineDash([20,20]);
    ctx.lineWidth=4;

    roadOffset += turbo ? 12 : 6;

    for(let i=-40;i<canvas.height;i+=40){
        ctx.beginPath();
        ctx.moveTo(canvas.width/2, i + (roadOffset%40));
        ctx.lineTo(canvas.width/2, i+20 + (roadOffset%40));
        ctx.stroke();
    }

    ctx.setLineDash([]);
}

// carro
function drawCar(x,y,color){
    ctx.fillStyle=color;
    ctx.fillRect(x,y,40,80);

    ctx.fillStyle="black";
    ctx.fillRect(x+5,y+5,10,15);
    ctx.fillRect(x+25,y+5,10,15);
    ctx.fillRect(x+5,y+60,10,15);
    ctx.fillRect(x+25,y+60,10,15);
}

// update
function update(){
    if(!playing || gameOver) return;

    let speed = turbo ? player.speed*2 : player.speed;
    player.x += move * speed;

    if(player.x < 0) player.x=0;
    if(player.x > canvas.width-40) player.x=canvas.width-40;

    enemies.forEach((e,i)=>{
        e.y += e.speed;

        if(
            player.x < e.x+40 &&
            player.x+40 > e.x &&
            player.y < e.y+80 &&
            player.y+80 > e.y
        ){
            crash.play();
            player.lives--;
            enemies.splice(i,1);

            if(player.lives <= 0){
                gameOver=true;
                engine.pause();
            }
        }

        if(e.y > canvas.height){
            enemies.splice(i,1);
            score++;
        }
    });
}

// draw
function draw(){
    drawRoad();

    drawCar(player.x, player.y, "cyan");
    enemies.forEach(e=>drawCar(e.x,e.y,"red"));

    ctx.fillStyle="white";
    ctx.font="20px Arial";
    ctx.fillText("Puntos: "+score,20,30);
    ctx.fillText("Vidas: "+player.lives,20,60);

    if(gameOver){
        ctx.fillStyle="red";
        ctx.font="40px Arial";
        ctx.fillText("GAME OVER", canvas.width/2-120, canvas.height/2);
        ctx.font="20px Arial";
        ctx.fillText("Recarga para jugar", canvas.width/2-100, canvas.height/2+40);
    }
}

// loop
function loop(){
    if(playing) engine.play().catch(()=>{});
    update();
    draw();
    requestAnimationFrame(loop);
}

// spawn dinámico
setInterval(()=>{
    if(playing && !gameOver) spawnEnemy();
},800);

loop();
</script>

</body>
</html>
