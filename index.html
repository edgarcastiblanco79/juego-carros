<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego de Carros</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #222;
    }
    canvas {
        display: block;
        margin: auto;
        background: #555;
    }
</style>
</head>
<body>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let player = { x: 180, y: 500, width: 40, height: 80, speed: 5 };
let enemies = [];
let gameOver = false;
let score = 0;

let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function spawnEnemy() {
    let x = Math.random() * (canvas.width - 40);
    enemies.push({ x: x, y: -80, width: 40, height: 80 });
}

function drawCar(x, y, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x, y, 40, 80);
}

function update() {
    if (gameOver) return;

    if (keys["ArrowLeft"] && player.x > 0) player.x -= player.speed;
    if (keys["ArrowRight"] && player.x < canvas.width - player.width) player.x += player.speed;

    enemies.forEach((enemy, index) => {
        enemy.y += 4;

        if (
            player.x < enemy.x + enemy.width &&
            player.x + player.width > enemy.x &&
            player.y < enemy.y + enemy.height &&
            player.y + player.height > enemy.y
        ) {
            gameOver = true;
        }

        if (enemy.y > canvas.height) {
            enemies.splice(index, 1);
            score++;
        }
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawCar(player.x, player.y, "cyan");
    enemies.forEach(enemy => drawCar(enemy.x, enemy.y, "red"));

    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Puntos: " + score, 10, 30);

    if (gameOver) {
        ctx.fillStyle = "yellow";
        ctx.font = "40px Arial";
        ctx.fillText("GAME OVER", 80, 300);
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

setInterval(spawnEnemy, 1000);
gameLoop();
</script>

</body>
</html>
