<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego DIOS 🚗🔥</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; margin:auto; }

.menu {
    position:absolute;
    width:100%; height:100%;
    background:black;
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.controls {
    position:fixed;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:space-around;
}

button {
    font-size:20px;
    padding:12px 18px;
    border:none;
    border-radius:10px;
    background:#00c3ff;
    color:white;
}
</style>
</head>
<body>

<div id="menu" class="menu">
    <h1>🚗 JUEGO NIVEL DIOS</h1>
    <button onclick="startGame()">▶️ Jugar</button>
    <p>Récord: <span id="record">0</span></p>
</div>

<canvas id="game"></canvas>

<div class="controls">
    <button id="left">⬅️</button>
    <button id="right">➡️</button>
    <button id="turbo">🚀</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

// estado
let playing=false, gameOver=false;

// jugador
let player={
    x:canvas.width/2-20,
    y:canvas.height-120,
    w:40,h:80,
    speed:6,
    lives:3
};

let enemies=[], stars=[];
let score=0;
let record=localStorage.getItem("record") || 0;
document.getElementById("record").innerText=record;

let move=0, turbo=false, turboBar=100;

// sonido
const engine=new Audio("https://www.soundjay.com/transportation/car-engine-1.mp3");
engine.loop=true;
const crash=new Audio("https://www.soundjay.com/transportation/car-crash-1.mp3");

// iniciar
function startGame(){
    document.getElementById("menu").style.display="none";
    playing=true;
}

// controles
document.getElementById("left").ontouchstart=()=>move=-1;
document.getElementById("left").ontouchend=()=>move=0;

document.getElementById("right").ontouchstart=()=>move=1;
document.getElementById("right").ontouchend=()=>move=0;

document.getElementById("turbo").ontouchstart=()=>turbo=true;
document.getElementById("turbo").ontouchend=()=>turbo=false;

document.addEventListener("keydown",e=>{
    if(e.key==="ArrowLeft") move=-1;
    if(e.key==="ArrowRight") move=1;
    if(e.key==="Shift") turbo=true;
});
document.addEventListener("keyup",e=>{
    if(e.key==="ArrowLeft"||e.key==="ArrowRight") move=0;
    if(e.key==="Shift") turbo=false;
});

// estrellas fondo
for(let i=0;i<100;i++){
    stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height});
}

// enemigos IA
function spawnEnemy(){
    enemies.push({
        x:Math.random()*(canvas.width-40),
        y:-100,
        speed:5+Math.random()*4,
        zigzag: Math.random()<0.5
    });
}

// dibujo
function drawCar(x,y,color){
    ctx.fillStyle=color;
    ctx.fillRect(x,y,40,80);

    ctx.fillStyle="black";
    ctx.fillRect(x+5,y+5,10,15);
    ctx.fillRect(x+25,y+5,10,15);
    ctx.fillRect(x+5,y+60,10,15);
    ctx.fillRect(x+25,y+60,10,15);
}

// fondo estrellas
function drawStars(){
    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="white";
    stars.forEach(s=>{
        s.y += turbo?10:4;
        if(s.y>canvas.height) s.y=0;
        ctx.fillRect(s.x,s.y,2,2);
    });
}

// update
function update(){
    if(!playing||gameOver) return;

    let speed=turbo&&turboBar>0?player.speed*2:player.speed;
    player.x += move*speed;

    if(player.x<0) player.x=0;
    if(player.x>canvas.width-40) player.x=canvas.width-40;

    // turbo
    if(turbo && turboBar>0) turboBar-=1;
    else turboBar+=0.5;
    if(turboBar>100) turboBar=100;

    enemies.forEach((e,i)=>{
        e.y+=e.speed;

        if(e.zigzag){
            e.x += Math.sin(e.y/20)*2;
        }

        // colisión
        if(player.x<e.x+40 && player.x+40>e.x &&
           player.y<e.y+80 && player.y+80>e.y){
            crash.play();
            player.lives--;
            enemies.splice(i,1);

            if(player.lives<=0){
                gameOver=true;
                engine.pause();

                if(score>record){
                    localStorage.setItem("record",score);
                }
            }
        }

        if(e.y>canvas.height){
            enemies.splice(i,1);
            score++;
        }
    });
}

// draw
function draw(){
    drawStars();

    drawCar(player.x,player.y,"cyan");
    enemies.forEach(e=>drawCar(e.x,e.y,"red"));

    ctx.fillStyle="white";
    ctx.fillText("Puntos: "+score,20,30);
    ctx.fillText("Vidas: "+player.lives,20,60);

    // barra turbo
    ctx.fillStyle="yellow";
    ctx.fillRect(20,80,turboBar*2,10);

    if(gameOver){
        ctx.fillStyle="red";
        ctx.font="40px Arial";
        ctx.fillText("GAME OVER",canvas.width/2-120,canvas.height/2);
        ctx.font="20px Arial";
        ctx.fillText("Recarga la página",canvas.width/2-100,canvas.height/2+40);
    }
}

// loop
function loop(){
    if(playing) engine.play().catch(()=>{});
    update();
    draw();
    requestAnimationFrame(loop);
}

setInterval(()=>{ if(playing&&!gameOver) spawnEnemy(); },700);

loop();
</script>

</body>
</html>
