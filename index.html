<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego PRO Carros</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}

canvas {
    display: block;
    margin: auto;
    background: #222;
}

/* botones celular */
.controls {
    position: fixed;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: space-around;
}

button {
    font-size: 25px;
    padding: 15px 25px;
    border: none;
    border-radius: 10px;
    background: #00c3ff;
    color: white;
}
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div class="controls">
    <button id="leftBtn">⬅️</button>
    <button id="rightBtn">➡️</button>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// tamaño adaptable
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// 🚗 jugador
let player = {
    x: canvas.width/2 - 20,
    y: canvas.height - 120,
    width: 40,
    height: 80
};

let enemies = [];
let score = 0;
let gameOver = false;
let move = 0;
let roadOffset = 0;

// 🔊 sonidos
const engine = new Audio("https://www.soundjay.com/transportation/car-engine-1.mp3");
engine.loop = true;

const crash = new Audio("https://www.soundjay.com/transportation/car-crash-1.mp3");

// 📱 botones táctiles
const leftBtn = document.getElementById("leftBtn");
const rightBtn = document.getElementById("rightBtn");

leftBtn.addEventListener("touchstart", () => { move = -6; engine.play().catch(()=>{}); });
leftBtn.addEventListener("touchend", () => { move = 0; });

rightBtn.addEventListener("touchstart", () => { move = 6; engine.play().catch(()=>{}); });
rightBtn.addEventListener("touchend", () => { move = 0; });

// 💻 mouse (por si pruebas en PC)
leftBtn.addEventListener("mousedown", () => move = -6);
leftBtn.addEventListener("mouseup", () => move = 0);

rightBtn.addEventListener("mousedown", () => move = 6);
rightBtn.addEventListener("mouseup", () => move = 0);

// ⌨️ teclado PC
document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowLeft") {
        move = -6;
        engine.play().catch(()=>{});
    }
    if (e.key === "ArrowRight") {
        move = 6;
        engine.play().catch(()=>{});
    }
});

document.addEventListener("keyup", (e) => {
    if (e.key === "ArrowLeft" || e.key === "ArrowRight") {
        move = 0;
    }
});

// enemigos
function spawnEnemy(){
    enemies.push({
        x: Math.random() * (canvas.width - 40),
        y: -100
    });
}

// carretera
function drawRoad(){
    ctx.fillStyle = "#333";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.strokeStyle = "white";
    ctx.setLineDash([20,20]);
    ctx.lineWidth = 4;

    roadOffset += 6;

    for(let i=-40;i<canvas.height;i+=40){
        ctx.beginPath();
        ctx.moveTo(canvas.width/2, i + (roadOffset%40));
        ctx.lineTo(canvas.width/2, i+20 + (roadOffset%40));
        ctx.stroke();
    }

    ctx.setLineDash([]);
}

// carro
function drawCar(x,y,color){
    ctx.fillStyle = color;
    ctx.fillRect(x,y,40,80);

    ctx.fillStyle="black";
    ctx.fillRect(x+5,y+5,10,15);
    ctx.fillRect(x+25,y+5,10,15);
    ctx.fillRect(x+5,y+60,10,15);
    ctx.fillRect(x+25,y+60,10,15);
}

// lógica
function update(){
    if(gameOver) return;

    player.x += move;

    // límites
    if(player.x < 0) player.x = 0;
    if(player.x > canvas.width-40) player.x = canvas.width-40;

    enemies.forEach((e,i)=>{
        e.y += 6;

        // colisión
        if(
            player.x < e.x+40 &&
            player.x+40 > e.x &&
            player.y < e.y+80 &&
            player.y+80 > e.y
        ){
            gameOver = true;
            crash.play();
            engine.pause();
        }

        if(e.y > canvas.height){
            enemies.splice(i,1);
            score++;
        }
    });
}

// dibujar
function draw(){
    drawRoad();

    drawCar(player.x, player.y, "cyan");
    enemies.forEach(e=>drawCar(e.x,e.y,"red"));

    ctx.fillStyle="white";
    ctx.font="20px Arial";
    ctx.fillText("Puntos: "+score,20,30);

    if(gameOver){
        ctx.fillStyle="red";
        ctx.font="40px Arial";
        ctx.fillText("GAME OVER", canvas.width/2-120, canvas.height/2);
    }
}

// loop
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

setInterval(spawnEnemy,1000);
loop();
</script>

</body>
</html>
