<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego PRO de Carros</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #111;
    }
    canvas {
        display: block;
        margin: auto;
        background: #333;
    }
</style>
</head>
<body>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// IMÁGENES (sprites)
const playerImg = new Image();
playerImg.src = "https://i.imgur.com/7Qp6F4B.png";

const enemyImg = new Image();
enemyImg.src = "https://i.imgur.com/Z6XKQwK.png";

// jugador
let player = {
    x: 180,
    y: 480,
    width: 40,
    height: 80,
    speed: 6
};

let enemies = [];
let score = 0;
let gameOver = false;

// controles
let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// crear enemigos
function spawnEnemy() {
    let x = Math.random() * (canvas.width - 40);
    enemies.push({ x: x, y: -80, width: 40, height: 80 });
}

// dibujar carretera
function drawRoad() {
    ctx.fillStyle = "#444";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = "white";
    ctx.lineWidth = 4;
    ctx.setLineDash([20, 20]);

    for (let i = -20; i < canvas.height; i += 40) {
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2, i);
        ctx.lineTo(canvas.width / 2, i + 20);
        ctx.stroke();
    }

    ctx.setLineDash([]);
}

// actualizar
function update() {
    if (gameOver) return;

    if (keys["ArrowLeft"] && player.x > 0) player.x -= player.speed;
    if (keys["ArrowRight"] && player.x < canvas.width - player.width) player.x += player.speed;

    enemies.forEach((enemy, index) => {
        enemy.y += 5;

        // colisión
        if (
            player.x < enemy.x + enemy.width &&
            player.x + player.width > enemy.x &&
            player.y < enemy.y + enemy.height &&
            player.y + player.height > enemy.y
        ) {
            gameOver = true;
        }

        if (enemy.y > canvas.height) {
            enemies.splice(index, 1);
            score++;
        }
    });
}

// dibujar
function draw() {
    drawRoad();

    // jugador
    ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);

    // enemigos
    enemies.forEach(enemy => {
        ctx.drawImage(enemyImg, enemy.x, enemy.y, enemy.width, enemy.height);
    });

    // puntaje
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Puntos: " + score, 10, 30);

    if (gameOver) {
        ctx.fillStyle = "red";
        ctx.font = "40px Arial";
        ctx.fillText("GAME OVER", 70, 300);
    }
}

// loop
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

setInterval(spawnEnemy, 1200);
gameLoop();
</script>

</body>
</html>
